name: Build Crash-utility
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
jobs:
  X86_64:
    runs-on: fedora
    container: amd64/fedora
    steps:
      - name: set up qemu
        uses: docker/setup-qemu-action@v3
      - uses: actions/checkout@v4
      - name: install deps
        run: sudo apt-get install patch gcc g++ liblzo2-dev libsnappy-dev libzstd-dev wget texinfo bison flex
      - name: echo "uname -a"
        run: uname -a
